name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests (excluding goldens)
        run: |
          mapfile -t files < <(find test -name '*_test.dart' ! -name '*_golden_test.dart')
          flutter test "${files[@]}"
