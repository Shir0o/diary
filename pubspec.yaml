name: diary
description: "A personal diary app for writing, reviewing, and reflecting on entries."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2+1
  local_auth: ^3.0.1
  shared_preferences: ^2.5.5
  uuid: ^4.3.3
  geolocator: ^13.0.1
  http: ^1.2.2
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  golden_toolkit: ^0.15.0
  flutter_launcher_icons: ^0.14.4
  sqflite_common_ffi: ^2.4.0+3
  google_sign_in_mocks: ^0.4.1
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/diary-app-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/diary-app-icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
